<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>Register Owner - DPR Dimsum</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="back-button-container">
            <a href="javascript:history.back()" class="back-button">
                ◀
            </a>
        </div>

        <div class="register-container">
            <div class="register-header">
                <h1>🍔 DPR Dimsum</h1>
                <h2>📝 Register Owner</h2>
                <p class="register-subtitle">Buat akun owner untuk mengelola aplikasi</p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <div class="register-form">
                <form method="POST" action="/register">
                    <div class="form-section">
                        <div class="form-group">
                            <label for="full_name">👤 Nama Lengkap</label>
                            <input type="text" id="full_name" name="full_name" placeholder="Masukkan nama lengkap Anda"
                                required autocomplete="name">
                        </div>

                        <div class="form-group">
                            <label for="username">👤 Username</label>
                            <input type="text" id="username" name="username" placeholder="Masukkan username" required
                                autocomplete="username" minlength="3" maxlength="20">
                        </div>

                        <div class="form-group">
                            <label for="password">🔒 Password</label>
                            <div class="password-input-container">
                                <input type="password" id="password" name="password"
                                    placeholder="Masukkan password (minimal 6 karakter)" required
                                    autocomplete="new-password" minlength="6">
                                <button type="button" class="password-toggle" onclick="togglePassword('password')">
                                    <svg id="toggle-icon-password" width="16" height="16" viewBox="0 0 24 24"
                                        fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#667eea"
                                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
                                        <circle cx="12" cy="12" r="3" stroke="#667eea" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirm_password">🔒 Konfirmasi Password</label>
                            <div class="password-input-container">
                                <input type="password" id="confirm_password" name="confirm_password"
                                    placeholder="Masukkan ulang password" required autocomplete="new-password"
                                    minlength="6">
                                <button type="button" class="password-toggle"
                                    onclick="togglePassword('confirm_password')">
                                    <svg id="toggle-icon-confirm_password" width="16" height="16" viewBox="0 0 24 24"
                                        fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#667eea"
                                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
                                        <circle cx="12" cy="12" r="3" stroke="#667eea" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="register-btn">
                        🚀 Register Owner
                    </button>
                </form>
            </div>

            <div class="register-footer">
                <p>Sudah punya akun? <a href="/" class="login-link">Login di sini</a></p>
            </div>
        </div>
    </div>

    <style>
        .register-container {
            max-width: 450px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #e9ecef;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #667eea;
        }

        .register-header h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #495057;
        }

        .register-subtitle {
            color: #6c757d;
            font-size: 14px;
            margin: 0;
            line-height: 1.5;
        }

        .register-form {
            margin-bottom: 30px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input:invalid {
            border-color: #c7b7b9;
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .register-footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .register-footer p {
            color: #6c757d;
            font-size: 14px;
            margin: 0;
        }

        .login-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .flash-messages {
            margin-bottom: 25px;
        }

        .flash-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .flash-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .flash-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .register-container {
                max-width: 100%;
                margin: 20px;
                padding: 30px 20px;
            }

            .register-header h1 {
                font-size: 2em;
            }

            .register-header h2 {
                font-size: 1.5em;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
            }

            .register-btn {
                padding: 14px;
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .register-container {
                margin: 10px;
                padding: 25px 15px;
            }

            .register-header h1 {
                font-size: 1.8em;
            }

            .register-header h2 {
                font-size: 1.3em;
            }

            .register-subtitle {
                font-size: 13px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-group input {
                padding: 10px 12px;
                font-size: 13px;
            }

            .register-btn {
                padding: 12px;
                font-size: 14px;
            }

            .register-footer p {
                font-size: 13px;
            }
        }

        @media (max-width: 360px) {
            .register-container {
                margin: 5px;
                padding: 20px 10px;
            }

            .register-header h1 {
                font-size: 1.6em;
            }

            .register-header h2 {
                font-size: 1.2em;
            }
        }

        /* Back Button Styles */
        .back-button-container {
            margin-bottom: 20px;
            text-align: left;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 20px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            width: 48px;
            height: 48px;
            min-width: 48px;
            min-height: 48px;
            position: relative;
            overflow: hidden;
        }

        .back-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .back-button:hover::before {
            opacity: 1;
        }

        .back-button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .back-button:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .back-button:after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .back-button:active:after {
            width: 100px;
            height: 100px;
        }

        /* Password Toggle Styles */
        .password-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-input-container input {
            padding-right: 50px !important;
        }

        .password-toggle {
            position: absolute;
            right: 8px;
            top: 30%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            min-width: 40px;
        }

        .password-toggle:hover {
            transform: translateY(-50%) scale(1.2);
        }

        .password-toggle span {
            width: 16px;
            height: 16px;
            user-select: none;
        }
    </style>

    <script>
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggleIcon = document.getElementById('toggle-icon-' + fieldId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                // Mata tertutup
                toggleIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="1" y1="1" x2="23" y2="23" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                `;
            } else {
                passwordInput.type = 'password';
                // Mata terbuka
                toggleIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                `;
            }
        }
    </script>
</body>

</html>
